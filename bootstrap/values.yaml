autosync:
  enabled: false

source:
  targetRevision: main
  repoURL: git@github.com:joerx/lab-cluster.sh.git

cluster:
  name: my-cluster
  domain: my-cluster.local

ngrok:
  enabled: false

externalDNS:
  enabled: false

secretStore:
  # backend controls the ESO ClusterSecretStore provider.
  # Use "infisical" for production clusters (requires Infisical credentials).
  # Use "kubernetes" for local clusters - secrets stored in the local-secrets namespace.
  backend: infisical

infisical:
  project: test
  path: test
