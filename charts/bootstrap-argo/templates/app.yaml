apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-bootstrap
  namespace: argocd
spec:
  project: bootstrap
  source:
    path: bootstrap
    repoURL: '{{ .Values.source.repoURL }}'
    targetRevision: '{{ .Values.source.targetRevision }}'
    helm:
      valuesObject:
        cluster:
          name: '{{ .Values.cluster.name }}'
          domain: '{{ .Values.cluster.domain }}'
        externalDNS:
          enabled: {{ .Values.externalDNS.enabled }}
        source:
          repoURL: '{{ .Values.source.repoURL }}'
          targetRevision: '{{ .Values.source.targetRevision }}'
        autosync:
          enabled: {{ .Values.autosync.enabled }}
        secretStore:
          backend: '{{ .Values.secretStore.backend }}'
        infisical:
          project: '{{ .Values.infisical.project }}'
          path: '{{ .Values.infisical.path }}'
        letsencrypt:
          enabled: {{ .Values.letsencrypt.enabled }}
          email: '{{ .Values.letsencrypt.email }}'
  destination:
    namespace: default
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    automated:
      prune: true
