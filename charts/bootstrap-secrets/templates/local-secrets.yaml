{{- if eq .Values.backend "kubernetes" }}
apiVersion: v1
kind: Namespace
metadata:
  name: local-secrets
---
# infra-secrets holds shared infrastructure credentials (Grafana Cloud, etc.).
# ClusterSecretStore 'infra-secrets' reads from this secret.
# ExternalSecrets must use remoteRef.key: infra-secrets and remoteRef.property: <KEY>.
# Additional keys can be added by other deployment repos creating their own Secrets
# in the local-secrets namespace and referencing them via the infra-secrets or
# cluster-secrets ClusterSecretStore with the appropriate property.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: local-secrets
stringData:
  GCLOUD_K8S_RW_TOKEN: {{ .Values.localSecrets.infraSecrets.GCLOUD_K8S_RW_TOKEN | quote }}
  GCLOUD_HOSTED_LOGS_ID: {{ .Values.localSecrets.infraSecrets.GCLOUD_HOSTED_LOGS_ID | quote }}
  GCLOUD_HOSTED_METRICS_ID: {{ .Values.localSecrets.infraSecrets.GCLOUD_HOSTED_METRICS_ID | quote }}
---
# cluster-secrets holds cluster-specific credentials (e.g. DNS provider tokens).
# ClusterSecretStore 'cluster-secrets' reads from this secret.
# Populate via --set localSecrets.clusterSecrets.<KEY>=<VALUE> at bootstrap time,
# or patch this secret manually after cluster creation.
apiVersion: v1
kind: Secret
metadata:
  name: cluster-secrets
  namespace: local-secrets
stringData: {{ .Values.localSecrets.clusterSecrets | toJson }}
{{- end }}
