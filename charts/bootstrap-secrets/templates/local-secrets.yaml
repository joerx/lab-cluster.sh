{{- if eq .Values.backend "kubernetes" }}
{{- if .Values.localSecrets.authelia.usersDatabase }}
apiVersion: v1
kind: Namespace
metadata:
  name: local-secrets
---
apiVersion: v1
kind: Secret
metadata:
  name: authelia-users
  namespace: local-secrets
stringData:
  users_database.yml: {{ .Values.localSecrets.authelia.usersDatabase | quote }}
{{- end }}
---
# grafana-credentials holds Grafana Cloud, to push metrics to the central logging stack
# ExternalSecrets must use remoteRef.key: infra-secrets and remoteRef.property: <KEY>.
# Additional keys can be added by other deployment repos creating their own Secrets
# in the local-secrets namespace and referencing them via the infra-secrets or
# cluster-secrets ClusterSecretStore with the appropriate property.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: local-secrets
stringData:
  GCLOUD_K8S_RW_TOKEN: {{ .Values.localSecrets.grafana.GCLOUD_K8S_RW_TOKEN | quote }}
  GCLOUD_HOSTED_LOGS_ID: {{ .Values.localSecrets.grafana.GCLOUD_HOSTED_LOGS_ID | quote }}
  GCLOUD_HOSTED_METRICS_ID: {{ .Values.localSecrets.grafana.GCLOUD_HOSTED_METRICS_ID | quote }}
---
# external-dns credentials to manage external dns records, if any (e.g. DNS provider tokens).
# Populate via --set localSecrets.externalDns.<KEY>=<VALUE> at bootstrap time,
# or patch this secret manually after cluster creation.
apiVersion: v1
kind: Secret
metadata:
  name: external-dns
  namespace: local-secrets
stringData: {{ .Values.localSecrets.externalDns | toJson }}
{{- end }}
