apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: linode-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: cluster-secrets
  target:
    name: linode-token
  data:
    - secretKey: LINODE_TOKEN
      remoteRef:
        key: external-dns
        property: LINODE_TOKEN
