{{- if eq .Values.backend "infisical" }}
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infra-secrets
spec:
  provider:
    infisical:
      hostAPI: '{{ .Values.infisical.endpoint }}'
      auth:
        universalAuthCredentials:
          clientId:
            key: clientId
            namespace: external-secrets
            name: universal-auth-credentials
          clientSecret:
            key: clientSecret
            namespace: external-secrets
            name: universal-auth-credentials
      secretsScope:
        projectSlug: '{{ .Values.infisical.project }}'
        environmentSlug: '{{ .Values.infisical.environment }}'
{{- else if eq .Values.backend "kubernetes" }}
# Local backend: reads from the 'infra-secrets' Secret in the 'local-secrets' namespace.
# ExternalSecrets using this store must set remoteRef.key: infra-secrets and
# remoteRef.property: <KEY> to select a specific value.
# NOTE: the infisical backend expects individual top-level secrets (key = secret name).
# Migrating to this store requires restructuring Infisical secrets as JSON objects
# named 'infra-secrets' so the property field resolves correctly for both backends.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infra-secrets
spec:
  provider:
    kubernetes:
      remoteNamespace: local-secrets
      server:
        url: "https://kubernetes.default.svc"
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: kube-system
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-local-reader
          namespace: external-secrets
{{- end }}
